name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------
  # Compute version from tag once, share with both jobs
  # ---------------------------------------------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.v.outputs.version_name }}
      version_code: ${{ steps.v.outputs.version_code }}
    steps:
      - id: v
        run: |
          NAME="${GITHUB_REF_NAME#v}"
          echo "version_name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # Android: build signed AAB → upload to Play (internal) → attach to GH Release
  # ---------------------------------------------------------------------
  android:
    needs: version
    runs-on: ubuntu-latest
    env:
      APP_VERSION_NAME: ${{ needs.version.outputs.version_name }}
      APP_VERSION_CODE: ${{ needs.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > androidApp/google-services.json

      - name: Fastlane android release
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: bundle exec fastlane android release

      - name: Upload AAB to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: androidApp/build/outputs/bundle/release/*.aab
          generate_release_notes: true

  # ---------------------------------------------------------------------
  # iOS: build signed IPA → upload to TestFlight
  # ---------------------------------------------------------------------
  ios:
    needs: version
    runs-on: macos-15
    env:
      APP_VERSION_NAME: ${{ needs.version.outputs.version_name }}
      APP_VERSION_CODE: ${{ needs.version.outputs.version_code }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
      IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Restore GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 -d > iosApp/iosApp/GoogleService-Info.plist

      - name: Set TEAM_ID in xcconfig
        run: |
          sed -i '' "s/^TEAM_ID=.*/TEAM_ID=${{ secrets.APPLE_TEAM_ID }}/" iosApp/Configuration/Config.xcconfig

      - name: Import signing certificate
        env:
          IOS_DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          echo "$IOS_DIST_CERT_P12" | base64 -d > "$RUNNER_TEMP/dist.p12"
          bundle exec fastlane run import_certificate \
            certificate_path:"$RUNNER_TEMP/dist.p12" \
            certificate_password:"$IOS_DIST_CERT_PASSWORD" \
            keychain_name:fastlane_tmp_keychain \
            keychain_password:fastlane

      - name: Install provisioning profile
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          echo "$IOS_PROVISIONING_PROFILE" | base64 -d > "$RUNNER_TEMP/profile.mobileprovision"
          bundle exec fastlane run install_provisioning_profile path:"$RUNNER_TEMP/profile.mobileprovision"

      - name: Fastlane ios release
        run: bundle exec fastlane ios release
